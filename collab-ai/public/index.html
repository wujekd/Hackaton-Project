<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hybrid Search Chatbot</title>
  <script src="/theme/theme.js"></script>
  <link rel="stylesheet" href="/theme/index.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app">
    <header class="app-header theme-surface">
      <div>
        <p class="app-kicker">Hybrid Search Chatbot</p>
        <h1>Hybrid Search Chatbot</h1>
        <p>Local webpage -> Supabase Edge Function -> OpenAI response</p>
      </div>
      <div class="theme-toggle theme-toggle--compact chat-theme-toggle">
        <div class="theme-toggle__group" role="group" aria-label="Chat theme preference">
          <button type="button" class="theme-toggle__button" data-theme-option="system">System</button>
          <button type="button" class="theme-toggle__button" data-theme-option="light">Light</button>
          <button type="button" class="theme-toggle__button" data-theme-option="dark">Dark</button>
        </div>
      </div>
    </header>

    <section class="card theme-surface">
      <div id="status" class="status">Set your Supabase values in <code>public/config.js</code>.</div>
      <ul id="messages" class="messages"></ul>

      <form id="chat-form" class="chat-form">
        <input id="prompt" type="text" placeholder="Ask something..." required />
        <button type="submit">Send</button>
      </form>
    </section>

    <section class="card sources-card theme-surface">
      <h2>Retrieved Context</h2>
      <ul id="sources" class="sources"></ul>
    </section>
  </main>

  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
