<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDX Student Dashboard</title>
    <script src="../theme/theme.js"></script>
    <link rel="stylesheet" href="../theme/index.css">
    <link rel="stylesheet" href="./dashboard.css">
</head>

<body>

    <!-- Particle canvas sits behind everything -->
    <canvas id="particle-canvas"></canvas>

    <nav>
        <div class="logo">MDX<span style="color:var(--red)">.</span></div>
        <div class="nav-actions">
            <div class="theme-toggle theme-toggle--compact dashboard-theme-toggle">
                <div class="theme-toggle__group" role="group" aria-label="Dashboard theme preference">
                    <button type="button" class="theme-toggle__button" data-theme-option="system">System</button>
                    <button type="button" class="theme-toggle__button" data-theme-option="light">Light</button>
                    <button type="button" class="theme-toggle__button" data-theme-option="dark">Dark</button>
                </div>
            </div>
            <div class="guest-avatar">G</div>
        </div>
    </nav>

    <div class="dashboard" id="dashboard">

        <div class="panel" id="events-panel">
            <div class="panel-header">
                <div class="panel-title">Events</div>
                <div class="panel-timer">
                    <div class="page-dots" id="page-dots-events"></div>
                    <div class="timer-ring-wrap">
                        <svg width="30" height="30" viewBox="0 0 30 30">
                            <circle class="timer-track" cx="15" cy="15" r="12"/>
                            <circle class="timer-arc" cx="15" cy="15" r="12" id="timer-arc-events"/>
                        </svg>
                        <div class="timer-num" id="timer-num-events">10</div>
                    </div>
                </div>
            </div>
            <div class="panel-content">
                <div class="items-list initial" id="events-list"></div>
            </div>
        </div>

        <div class="panel" id="collabs-panel">
            <div class="panel-header">
                <div class="panel-title">Collaborations</div>
                <div class="panel-timer">
                    <div class="page-dots" id="page-dots-collabs"></div>
                    <div class="timer-ring-wrap">
                        <svg width="30" height="30" viewBox="0 0 30 30">
                            <circle class="timer-track" cx="15" cy="15" r="12"/>
                            <circle class="timer-arc" cx="15" cy="15" r="12" id="timer-arc-collabs"/>
                        </svg>
                        <div class="timer-num" id="timer-num-collabs">10</div>
                    </div>
                </div>
            </div>
            <div class="panel-content">
                <div class="items-list initial" id="collabs-list"></div>
            </div>
        </div>

        <div class="panel" id="engagement-panel">
            <div class="panel-header">
                <div class="panel-title">Engagement</div>
            </div>
            <div class="panel-content">
                <!-- Poll Section -->
                <div class="poll-section">
                    <div class="poll-question" id="poll-title">Loading poll...</div>
                    <div class="poll-options" id="poll-options"></div>
                    <div class="poll-votes" id="poll-votes">Loading dashboard data...</div>
                </div>

                <!-- QR Code Section -->
                <div class="qr-section">
                    <div class="qr-title">Vote in This Poll</div>
                    <div class="qr-container">
                        <div class="qr-code">
                            <!-- Mock QR Code SVG -->
                            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <rect width="100" height="100" fill="white"/>
                                <rect x="5" y="5" width="25" height="25" fill="#0c0d10"/>
                                <rect x="8" y="8" width="19" height="19" fill="white"/>
                                <rect x="11" y="11" width="13" height="13" fill="#0c0d10"/>
                                <rect x="70" y="5" width="25" height="25" fill="#0c0d10"/>
                                <rect x="73" y="8" width="19" height="19" fill="white"/>
                                <rect x="76" y="11" width="13" height="13" fill="#0c0d10"/>
                                <rect x="5" y="70" width="25" height="25" fill="#0c0d10"/>
                                <rect x="8" y="73" width="19" height="19" fill="white"/>
                                <rect x="11" y="76" width="13" height="13" fill="#0c0d10"/>
                                <rect x="35" y="5" width="5" height="5" fill="#0c0d10"/>
                                <rect x="45" y="5" width="5" height="5" fill="#0c0d10"/>
                                <rect x="55" y="5" width="5" height="5" fill="#0c0d10"/>
                                <rect x="35" y="15" width="5" height="5" fill="#0c0d10"/>
                                <rect x="50" y="15" width="5" height="5" fill="#0c0d10"/>
                                <rect x="60" y="15" width="5" height="5" fill="#0c0d10"/>
                                <rect x="35" y="25" width="5" height="5" fill="#0c0d10"/>
                                <rect x="45" y="25" width="5" height="5" fill="#0c0d10"/>
                                <rect x="55" y="25" width="5" height="5" fill="#0c0d10"/>
                                <rect x="5" y="35" width="5" height="5" fill="#0c0d10"/>
                                <rect x="15" y="35" width="5" height="5" fill="#0c0d10"/>
                                <rect x="25" y="35" width="5" height="5" fill="#0c0d10"/>
                                <rect x="5" y="45" width="5" height="5" fill="#0c0d10"/>
                                <rect x="20" y="45" width="5" height="5" fill="#0c0d10"/>
                                <rect x="5" y="55" width="5" height="5" fill="#0c0d10"/>
                                <rect x="15" y="55" width="5" height="5" fill="#0c0d10"/>
                                <rect x="25" y="55" width="5" height="5" fill="#0c0d10"/>
                                <rect x="35" y="35" width="5" height="5" fill="#0c0d10"/>
                                <rect x="45" y="35" width="5" height="5" fill="#0c0d10"/>
                                <rect x="55" y="35" width="5" height="5" fill="#0c0d10"/>
                                <rect x="65" y="35" width="5" height="5" fill="#0c0d10"/>
                                <rect x="35" y="45" width="5" height="5" fill="#0c0d10"/>
                                <rect x="50" y="45" width="5" height="5" fill="#0c0d10"/>
                                <rect x="60" y="45" width="5" height="5" fill="#0c0d10"/>
                                <rect x="70" y="45" width="5" height="5" fill="#0c0d10"/>
                                <rect x="35" y="55" width="5" height="5" fill="#0c0d10"/>
                                <rect x="45" y="55" width="5" height="5" fill="#0c0d10"/>
                                <rect x="55" y="55" width="5" height="5" fill="#0c0d10"/>
                                <rect x="65" y="55" width="5" height="5" fill="#0c0d10"/>
                                <rect x="75" y="55" width="5" height="5" fill="#0c0d10"/>
                                <rect x="85" y="55" width="5" height="5" fill="#0c0d10"/>
                                <rect x="70" y="70" width="5" height="5" fill="#0c0d10"/>
                                <rect x="80" y="70" width="5" height="5" fill="#0c0d10"/>
                                <rect x="90" y="70" width="5" height="5" fill="#0c0d10"/>
                                <rect x="70" y="80" width="5" height="5" fill="#0c0d10"/>
                                <rect x="85" y="80" width="5" height="5" fill="#0c0d10"/>
                                <rect x="70" y="90" width="5" height="5" fill="#0c0d10"/>
                                <rect x="80" y="90" width="5" height="5" fill="#0c0d10"/>
                                <rect x="90" y="90" width="5" height="5" fill="#0c0d10"/>
                                <rect x="35" y="70" width="5" height="5" fill="#0c0d10"/>
                                <rect x="45" y="70" width="5" height="5" fill="#0c0d10"/>
                                <rect x="55" y="70" width="5" height="5" fill="#0c0d10"/>
                                <rect x="40" y="80" width="5" height="5" fill="#0c0d10"/>
                                <rect x="50" y="80" width="5" height="5" fill="#0c0d10"/>
                                <rect x="60" y="80" width="5" height="5" fill="#0c0d10"/>
                                <rect x="35" y="90" width="5" height="5" fill="#0c0d10"/>
                                <rect x="50" y="90" width="5" height="5" fill="#0c0d10"/>
                                <rect x="60" y="90" width="5" height="5" fill="#0c0d10"/>
                            </svg>
                        </div>
                        <div class="qr-label">Scan this QR code to vote in the poll.</div>
                    </div>
                </div>
            </div>
        </div>

    </div>
    <script type="module">
        const INFO_SCREEN_FEED_URL = "https://europe-west1-mdxnetwork.cloudfunctions.net/infoScreenFeed";
        const DEFAULT_POLL = {
            status: "placeholder",
            title: "Polls are coming soon",
            description: "This section is reserved for live poll results."
        };
        const PAGE_SIZE = 4;
        const TICK = 10;
        const CIRC = 2 * Math.PI * 12;
        const THEME_BUTTONS = Array.from(document.querySelectorAll("[data-theme-option]"));
        const dateFormatter = new Intl.DateTimeFormat("en-GB", {
            day: "2-digit",
            month: "short",
            year: "numeric"
        });
        const dateTimeFormatter = new Intl.DateTimeFormat("en-GB", {
            day: "2-digit",
            month: "short",
            year: "numeric",
            hour: "2-digit",
            minute: "2-digit"
        });

        let eventPages = [[{ title: "Loading events...", desc: "Fetching from Firebase.", meta: "" }]];
        let collabPages = [[{ title: "Loading collaborations...", desc: "Fetching from Firebase.", meta: "" }]];
        let totalPages = 1;
        let currentPage = 0;
        let timeLeft = TICK;

        const arcEls = [
            document.getElementById("timer-arc-events"),
            document.getElementById("timer-arc-collabs")
        ];
        const numEls = [
            document.getElementById("timer-num-events"),
            document.getElementById("timer-num-collabs")
        ];

        function syncThemeButtons() {
            const activePreference = window.MDXTheme?.getPreference?.() ?? "system";
            const activeCustomThemeId = window.MDXTheme?.getActiveCustomThemeId?.() ?? null;
            THEME_BUTTONS.forEach((button) => {
                const isActive = !activeCustomThemeId && button.dataset.themeOption === activePreference;
                button.classList.toggle("is-active", isActive);
                button.setAttribute("aria-pressed", isActive ? "true" : "false");
            });
        }

        THEME_BUTTONS.forEach((button) => {
            button.addEventListener("click", () => {
                window.MDXTheme?.setPreference?.(button.dataset.themeOption ?? "system");
            });
        });
        window.addEventListener("mdx-theme-change", syncThemeButtons);
        syncThemeButtons();

        (function initParticles() {
            const canvas = document.getElementById("particle-canvas");
            const ctx = canvas.getContext("2d");
            let W;
            let H;
            const particles = [];

            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
            }

            function rand(min, max) {
                return Math.random() * (max - min) + min;
            }

            function getParticlePalette() {
                const isDark = document.documentElement.dataset.theme === "dark";
                return {
                    accent: "rgba(212,0,42,",
                    neutral: isDark ? "rgba(234,236,242," : "rgba(18,23,34,"
                };
            }

            function createParticle() {
                const palette = getParticlePalette();
                return {
                    x: rand(0, W),
                    y: rand(H * 0.2, H),
                    r: rand(1, 2.8),
                    speed: rand(0.3, 1.1),
                    opacity: rand(0.08, 0.28),
                    drift: rand(-0.25, 0.25),
                    color: Math.random() < 0.35 ? palette.accent : palette.neutral
                };
            }

            function retintParticles() {
                const palette = getParticlePalette();
                particles.forEach((particle) => {
                    particle.color = Math.random() < 0.35 ? palette.accent : palette.neutral;
                });
            }

            window.addEventListener("resize", resize);
            window.addEventListener("mdx-theme-change", retintParticles);
            resize();

            for (let i = 0; i < 55; i += 1) {
                const particle = createParticle();
                particle.y = rand(0, H);
                particles.push(particle);
            }

            function draw() {
                ctx.clearRect(0, 0, W, H);
                for (const particle of particles) {
                    ctx.beginPath();
                    ctx.arc(particle.x, particle.y, particle.r, 0, Math.PI * 2);
                    ctx.fillStyle = particle.color + particle.opacity + ")";
                    ctx.fill();

                    particle.y -= particle.speed;
                    particle.x += particle.drift;
                    particle.opacity -= 0.0006;

                    if (particle.y < -10 || particle.opacity <= 0) {
                        Object.assign(particle, createParticle());
                        particle.y = H + 10;
                    }
                }
                requestAnimationFrame(draw);
            }

            draw();
        })();

        function escapeHtml(value) {
            return String(value ?? "").replace(/[&<>"']/g, (char) => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                "\"": "&quot;",
                "'": "&#39;"
            })[char]);
        }

        function getPages(items) {
            const out = [];
            for (let i = 0; i < items.length; i += PAGE_SIZE) {
                out.push(items.slice(i, i + PAGE_SIZE));
            }
            return out;
        }

        function toDate(value) {
            if (!value) return null;
            if (value instanceof Date) return value;
            if (typeof value?.toDate === "function") return value.toDate();
            if (typeof value === "string" || typeof value === "number") {
                const parsed = new Date(value);
                return Number.isNaN(parsed.getTime()) ? null : parsed;
            }
            if (typeof value?.seconds === "number") {
                return new Date(value.seconds * 1000);
            }
            return null;
        }

        function formatDate(value) {
            const parsed = toDate(value);
            return parsed ? dateFormatter.format(parsed) : "Date TBD";
        }

        function formatDateTime(value) {
            const parsed = toDate(value);
            return parsed ? dateTimeFormatter.format(parsed) : "";
        }

        function normalizeEvent(item) {
            return {
                title: item?.name || item?.title || "Untitled event",
                desc: item?.description || "No description provided.",
                meta: formatDate(item?.date)
            };
        }

        function normalizeCollaboration(item) {
            const tags = Array.isArray(item?.tags)
                ? item.tags.filter((tag) => typeof tag === "string" && tag.trim()).slice(0, 3)
                : [];
            const parts = [];
            if (item?.authorName) parts.push(`By ${item.authorName}`);
            if (tags.length > 0) parts.push(tags.map((tag) => `#${tag}`).join(" "));
            return {
                title: item?.title || "Untitled collaboration",
                desc: item?.description || "No description provided.",
                meta: parts.join(" | ")
            };
        }

        function setArcs(t) {
            const frac = t / TICK;
            const offset = CIRC * (1 - frac);
            const r = Math.round(212 * (1 - frac) + 80 * frac);
            const g = Math.round(180 * frac);
            const color = `rgb(${r},${g},42)`;
            const glow = `drop-shadow(0 0 ${2 + (TICK - t) * 0.4}px rgba(${r},${g},42,0.9))`;
            arcEls.forEach((el) => {
                el.style.strokeDashoffset = offset;
                el.style.stroke = color;
                el.style.filter = glow;
            });
            numEls.forEach((el) => {
                el.textContent = String(t);
            });
        }

        function resetArcs() {
            arcEls.forEach((el) => {
                el.style.transition = "none";
                el.style.strokeDashoffset = 0;
            });
            requestAnimationFrame(() => requestAnimationFrame(() => {
                arcEls.forEach((el) => {
                    el.style.transition = "stroke-dashoffset 1s linear, stroke 0.4s ease, filter 0.4s ease";
                });
            }));
        }

        function buildDots(containerId, total, current) {
            const el = document.getElementById(containerId);
            el.innerHTML = Array.from({ length: total }, (_, i) =>
                `<div class="page-dot${i === current ? " active" : ""}"></div>`
            ).join("");
        }

        function updateDots(page) {
            ["page-dots-events", "page-dots-collabs"].forEach((id) => {
                document.getElementById(id).querySelectorAll(".page-dot").forEach((dot, index) => {
                    dot.classList.toggle("active", index === page);
                });
            });
        }

        function renderCards(listEl, items) {
            listEl.innerHTML = items.map((item) => `
                <div class="item-card">
                    <div class="item-title">${escapeHtml(item.title)}</div>
                    <div class="item-desc">${escapeHtml(item.desc)}</div>
                    ${item.meta ? `<div class="item-meta">${escapeHtml(item.meta)}</div>` : ""}
                </div>
            `).join("");
        }

        function showPage(page, animate) {
            const eList = document.getElementById("events-list");
            const cList = document.getElementById("collabs-list");
            const ep = eventPages[page % eventPages.length];
            const cp = collabPages[page % collabPages.length];

            if (!animate) {
                renderCards(eList, ep);
                renderCards(cList, cp);
                updateDots(page);
                return;
            }

            eList.classList.add("fading-out");
            cList.classList.add("fading-out");

            setTimeout(() => {
                renderCards(eList, ep);
                renderCards(cList, cp);
                updateDots(page);
                eList.classList.remove("fading-out");
                cList.classList.remove("fading-out");
                eList.classList.add("fading-in");
                cList.classList.add("fading-in");

                eList.offsetHeight;
                requestAnimationFrame(() => {
                    eList.classList.add("visible");
                    cList.classList.add("visible");
                });

                setTimeout(() => {
                    eList.classList.remove("fading-in", "visible");
                    cList.classList.remove("fading-in", "visible");
                }, 300);
            }, 250);
        }

        function setDashboardPages(data) {
            const eventCards = data.events.map(normalizeEvent);
            const collabCards = data.collaborations.map(normalizeCollaboration);

            eventPages = getPages(eventCards);
            collabPages = getPages(collabCards);

            if (eventPages.length === 0) {
                eventPages = [[{
                    title: "No events yet",
                    desc: "No event documents found in Firebase.",
                    meta: ""
                }]];
            }
            if (collabPages.length === 0) {
                collabPages = [[{
                    title: "No collaborations yet",
                    desc: "No collaboration documents found in Firebase.",
                    meta: ""
                }]];
            }

            totalPages = Math.max(eventPages.length, collabPages.length, 1);
            currentPage = 0;
            timeLeft = TICK;
            buildDots("page-dots-events", totalPages, 0);
            buildDots("page-dots-collabs", totalPages, 0);
            showPage(0, false);
            setArcs(timeLeft);
        }

        function renderPoll(polls, generatedAt) {
            const titleEl = document.getElementById("poll-title");
            const optionsEl = document.getElementById("poll-options");
            const votesEl = document.getElementById("poll-votes");
            const qrSection = document.querySelector(".qr-section");

            if (polls?.status === "placeholder") {
                titleEl.textContent = polls.title || DEFAULT_POLL.title;
                optionsEl.innerHTML = `<div class="poll-placeholder">${escapeHtml(polls.description || DEFAULT_POLL.description)}</div>`;
                votesEl.textContent = generatedAt
                    ? `Updated ${formatDateTime(generatedAt)}`
                    : "Waiting for poll activation";
                qrSection.style.display = "none";
                return;
            }

            const options = Array.isArray(polls?.options) ? polls.options : [];
            if (options.length === 0) {
                titleEl.textContent = polls?.title || "No active poll";
                optionsEl.innerHTML = "<div class=\"poll-placeholder\">No poll options available right now.</div>";
                votesEl.textContent = generatedAt ? `Updated ${formatDateTime(generatedAt)}` : "";
                qrSection.style.display = "none";
                return;
            }

            const parsed = options.map((option) => {
                const label = option?.label || option?.text || "Option";
                const votes = Number.isFinite(option?.votes) ? option.votes : 0;
                return { label, votes };
            });
            const totalVotes = parsed.reduce((sum, option) => sum + option.votes, 0);

            titleEl.textContent = polls?.title || "Live poll";
            optionsEl.innerHTML = parsed.map((option) => {
                const percent = totalVotes > 0 ? Math.round((option.votes / totalVotes) * 100) : 0;
                return `
                    <div class="poll-option voted">
                        <div class="poll-option-bar" style="width: ${percent}%"></div>
                        <div class="poll-option-content">
                            <span class="poll-option-text">${escapeHtml(option.label)}</span>
                            <span class="poll-option-percent">${percent}%</span>
                        </div>
                    </div>
                `;
            }).join("");
            requestAnimationFrame(() => {
                optionsEl.querySelectorAll(".poll-option-bar").forEach((bar) => {
                    bar.classList.add("filled");
                });
            });
            votesEl.textContent = `${totalVotes.toLocaleString()} votes cast`;
            qrSection.style.display = "";
        }

        async function fetchDashboardData() {
            const response = await fetch(INFO_SCREEN_FEED_URL);
            if (!response.ok) throw new Error(`Feed request failed: ${response.status}`);
            const data = await response.json();
            return {
                generatedAt: data.generatedAt ?? new Date().toISOString(),
                events: Array.isArray(data.events) ? data.events : [],
                collaborations: Array.isArray(data.collaborations) ? data.collaborations : [],
                polls: data.polls ?? DEFAULT_POLL
            };
        }

        let lastTick = null;
        function tick(now) {
            if (lastTick === null) {
                lastTick = now;
            }
            if (now - lastTick >= 1000) {
                lastTick += 1000;
                timeLeft -= 1;
                setArcs(timeLeft);
                if (timeLeft <= 0) {
                    currentPage = (currentPage + 1) % totalPages;
                    showPage(currentPage, true);
                    timeLeft = TICK;
                    resetArcs();
                }
            }
            requestAnimationFrame(tick);
        }

        function init() {
            buildDots("page-dots-events", totalPages, 0);
            buildDots("page-dots-collabs", totalPages, 0);
            showPage(0, false);

            requestAnimationFrame(() => requestAnimationFrame(() => {
                arcEls.forEach((el) => {
                    el.style.transition = "stroke-dashoffset 1s linear, stroke 0.4s ease, filter 0.4s ease";
                });
                setArcs(TICK);
                requestAnimationFrame(tick);
            }));

            fetchDashboardData()
                .then((data) => {
                    setDashboardPages(data);
                    renderPoll(data.polls, data.generatedAt);
                })
                .catch((error) => {
                    console.error("Failed to load dashboard data", error);
                    setDashboardPages({
                        events: [],
                        collaborations: []
                    });
                    renderPoll(DEFAULT_POLL, null);
                    const votesEl = document.getElementById("poll-votes");
                    votesEl.textContent = "Unable to load Firebase data";
                });
        }

        init();
    </script>
</body>

</html>
