<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDX Student Dashboard</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #0c0d10;
            --bg2: #111318;
            --bg3: #181b21;
            --panel-bg: #1c1f27;
            --panel-border: rgba(255, 255, 255, 0.07);
            --panel-border2: rgba(255, 255, 255, 0.12);
            --text-primary: #eaecf2;
            --text-secondary: #9399b8;
            --text-muted: #6e7491;
            --accent: #d4002a;
            --accent-hover: #b8001f;
            --accent-dim: rgba(212, 0, 42, 0.12);
            --accent-mid: rgba(212, 0, 42, 0.22);
            --nav-height: 70px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* ── Keyframes ── */
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes logoPulse {
            0%, 100% { text-shadow: 0 0 8px rgba(212, 0, 42, 0.5), 0 0 24px rgba(212, 0, 42, 0.2); }
            50%       { text-shadow: 0 0 16px rgba(212, 0, 42, 0.9), 0 0 48px rgba(212, 0, 42, 0.4); }
        }

        @keyframes navShimmer {
            0%   { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

@keyframes qrFloat {
            0%, 100% { transform: translateY(0px) scale(1);    box-shadow: 0 4px 20px rgba(255,255,255,0.15); }
            50%       { transform: translateY(-6px) scale(1.02); box-shadow: 0 12px 36px rgba(255,255,255,0.28); }
        }

        @keyframes avatarSpin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        @keyframes barShimmer {
            0%   { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        @keyframes scanLine {
            0%   { top: 0%; opacity: 1; }
            100% { top: 100%; opacity: 0.3; }
        }

        @keyframes borderGlow {
            0%, 100% { border-color: rgba(212, 0, 42, 0.3); box-shadow: 0 0 8px rgba(212,0,42,0.1); }
            50%       { border-color: rgba(212, 0, 42, 0.7); box-shadow: 0 0 20px rgba(212,0,42,0.3); }
        }

        /* ── Body & Canvas ── */
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            overflow: auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            position: relative;
        }

        #particle-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Panel Timer Widget ── */
        .panel-timer {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .page-dots {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .page-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: background 0.3s ease, transform 0.3s ease;
        }

        .page-dot.active {
            background: var(--accent);
            transform: scale(1.4);
            box-shadow: 0 0 6px rgba(212,0,42,0.7);
        }

        .timer-ring-wrap {
            position: relative;
            width: 30px;
            height: 30px;
            flex-shrink: 0;
        }

        .timer-ring-wrap svg {
            transform: rotate(-90deg);
            will-change: transform;
        }

        .timer-track {
            fill: none;
            stroke: rgba(255,255,255,0.07);
            stroke-width: 3;
        }

        .timer-arc {
            fill: none;
            stroke: var(--accent);
            stroke-width: 3;
            stroke-linecap: round;
            stroke-dasharray: 75.4;
            stroke-dashoffset: 0;
            will-change: stroke-dashoffset;
        }

        .timer-num {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-primary);
        }

        nav {
            height: var(--nav-height);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            border-bottom: 1px solid var(--panel-border);
            background: rgba(12, 13, 16, 0.94);
            backdrop-filter: blur(14px);
            z-index: 10;
            position: relative;
            animation: fadeSlideUp 0.5s ease both;
        }

        nav::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(212,0,42,0.6) 30%,
                rgba(212,0,42,0.9) 50%,
                rgba(212,0,42,0.6) 70%,
                transparent 100%);
            background-size: 200% 100%;
            animation: navShimmer 3s linear infinite;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 60px;
            letter-spacing: -0.02em;
            animation: logoPulse 3s ease-in-out infinite;
        }

        .logo span {
            color: var(--accent);
        }

        .guest-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            color: white;
            cursor: pointer;
        }

        /* ── Dashboard ── */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 32px;
            padding: 32px 40px 40px;
            height: calc(100vh - var(--nav-height));
            position: relative;
            align-items: stretch;
            z-index: 1;
            box-sizing: border-box;
        }

        /* ── Panels ── */
        .panel {
            min-width: 0;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border2);
            border-radius: 10px;
            padding: 28px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(16px);
            opacity: 0;
            animation: fadeSlideUp 0.6s ease forwards;
        }

        #events-panel     { animation-delay: 0.15s; }
        #collabs-panel    { animation-delay: 0.28s; }
        #engagement-panel { animation-delay: 0.41s; }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            white-space: nowrap;
        }

        .panel-title {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 600;
        }

        .panel-content {
            display: flex;
            flex-direction: column;
            gap: 18px;
            flex: 1;
            overflow: hidden;
        }

        .items-list {
            flex: 1;
            overflow: hidden;
            padding-right: 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-bottom: 0;
            will-change: opacity, transform;
            transition: opacity 0.25s ease, transform 0.25s ease;
        }

        .items-list.fading-out {
            opacity: 0;
            transform: translateY(-8px);
            pointer-events: none;
        }

        .items-list.fading-in {
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
        }

        .items-list.fading-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ── Item Cards ── */
        .item-card {
            background: var(--bg3);
            padding: 16px;
            border-radius: 0;
            border: 1px solid var(--panel-border);
            border-left: 3px solid transparent;
            position: relative;
            overflow: hidden;
        }

        /* Only animate on initial page load (not dynamically rendered cards) */
        .items-list.initial .item-card {
            opacity: 0;
            animation: fadeSlideUp 0.5s ease forwards;
        }
        .items-list.initial .item-card:nth-child(1) { animation-delay: 0.4s; }
        .items-list.initial .item-card:nth-child(2) { animation-delay: 0.5s; }
        .items-list.initial .item-card:nth-child(3) { animation-delay: 0.6s; }
        .items-list.initial .item-card:nth-child(4) { animation-delay: 0.7s; }

        .item-title {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .item-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.65;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .item-meta {
            margin-top: 8px;
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.4;
        }


        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--bg3); }

        /* ── Poll ── */
        .poll-section {
            margin-bottom: 0;
        }

        .poll-question {
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .poll-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .poll-placeholder {
            background: var(--bg3);
            border: 1px solid var(--panel-border);
            padding: 14px 16px;
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.55;
        }

        .poll-option {
            background: var(--bg3);
            border: 1px solid var(--panel-border);
            padding: 12px 16px;
            cursor: default;
            pointer-events: none;
            position: relative;
            overflow: hidden;
        }

        .poll-option.voted {
            pointer-events: none;
        }

        .poll-option-bar {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 0%;
            background: linear-gradient(90deg, rgba(212,0,42,0.18) 0%, rgba(212,0,42,0.28) 100%);
            background-size: 200% 100%;
            z-index: 0;
            transition: width 0.9s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* shimmer sweep after bar fills */
        .poll-option-bar.filled {
            animation: barShimmer 1.8s ease 0.9s 1;
            background: linear-gradient(
                90deg,
                rgba(212,0,42,0.18) 0%,
                rgba(212,0,42,0.28) 40%,
                rgba(255,80,80,0.45) 50%,
                rgba(212,0,42,0.28) 60%,
                rgba(212,0,42,0.18) 100%
            );
            background-size: 200% 100%;
        }

        .poll-option-content {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .poll-option-text {
            font-size: 14px;
            color: var(--text-primary);
        }

        .poll-option-percent {
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 14px;
            color: var(--accent);
        }

        .poll-votes {
            margin-top: 12px;
            font-size: 12px;
            color: var(--text-muted);
        }

        /* ── Engagement Panel ── */
        #engagement-panel .panel-content {
            overflow: hidden !important;
            padding-right: 0;
            display: grid !important;
            grid-template-columns: 1fr 1fr !important;
            gap: 28px !important;
            align-items: start !important;
        }

        /* ── QR Code ── */
        .qr-section {
            border-left: 1px solid var(--panel-border);
            padding-left: 28px;
        }

        .qr-title {
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .qr-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            padding-bottom: 8px;
            width: 100%;
        }

        .qr-code {
            width: 80%;
            min-width: 140px;
            max-width: 220px;
            aspect-ratio: 1 / 1;
            background: white;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            animation: qrFloat 4s ease-in-out infinite;
            box-shadow: 0 4px 20px rgba(255,255,255,0.15);
        }

        /* Scan line effect over QR */
        .qr-code::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, rgba(212,0,42,0.8), transparent);
            animation: scanLine 2.5s linear infinite;
            z-index: 2;
            pointer-events: none;
        }

        .qr-code svg {
            width: 100%;
            height: 100%;
        }

        .qr-label {
            font-size: 13px;
            color: var(--text-secondary);
            text-align: center;
        }

        .qr-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        /* ── Mobile ── */
        @media (max-width: 900px) {
            nav { padding: 0 20px; }

            .dashboard {
                grid-template-columns: 1fr;
                height: auto;
                gap: 20px;
                padding: 20px 16px 28px;
            }

            .panel { padding: 20px; }

            .poll-option-content { gap: 12px; }

            #engagement-panel .panel-content {
                grid-template-columns: 1fr !important;
            }

            .qr-section {
                border-left: none;
                border-top: 1px solid var(--panel-border);
                padding-left: 0;
                padding-top: 20px;
            }

            .qr-code {
                width: min(70%, 280px);
                min-width: 160px;
            }
        }
    </style>
</head>

        <script type="module">
        const INFO_SCREEN_FEED_URL = "https://europe-west1-mdxnetwork.cloudfunctions.net/infoScreenFeed";

        (function () {
            const canvas = document.getElementById("particle-canvas");
            const ctx = canvas.getContext("2d");
            let W;
            let H;
            const particles = [];

            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
            }
            window.addEventListener("resize", resize);
            resize();

            function rand(min, max) {
                return Math.random() * (max - min) + min;
            }

            function createParticle() {
                return {
                    x: rand(0, W),
                    y: rand(H * 0.2, H),
                    r: rand(1, 2.8),
                    speed: rand(0.3, 1.1),

        function escapeHtml(value) {
            return String(value ?? "").replace(/[&<>"']/g, (char) => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                "\"": "&quot;",
                "'": "&#39;"
            })[char]);
        }

        function getPages(items) {
            const out = [];
            for (let i = 0; i < items.length; i += PAGE_SIZE) {
                out.push(items.slice(i, i + PAGE_SIZE));
            }
            return out;
        }

        function toDate(value) {
            if (!value) return null;
            if (value instanceof Date) return value;
            if (typeof value?.toDate === "function") return value.toDate();
            if (typeof value === "string" || typeof value === "number") {
                const parsed = new Date(value);
                return Number.isNaN(parsed.getTime()) ? null : parsed;
            }
            if (typeof value?.seconds === "number") {
                return new Date(value.seconds * 1000);
            }
            return null;
        }

        function formatDate(value) {
            const parsed = toDate(value);
            return parsed ? dateFormatter.format(parsed) : "Date TBD";
        }

        function formatDateTime(value) {
            const parsed = toDate(value);
            return parsed ? dateTimeFormatter.format(parsed) : "";
        }

        function normalizeEvent(item) {
            return {
                title: item?.name || item?.title || "Untitled event",
                desc: item?.description || "No description provided.",
                meta: formatDate(item?.date)
            };
        }

        function normalizeCollaboration(item) {
            const tags = Array.isArray(item?.tags)
                ? item.tags.filter((tag) => typeof tag === "string" && tag.trim()).slice(0, 3)
                : [];
            const parts = [];
            if (item?.authorName) parts.push(`By ${item.authorName}`);
            if (tags.length > 0) parts.push(tags.map((tag) => `#${tag}`).join(" "));
            return {
                title: item?.title || "Untitled collaboration",
                desc: item?.description || "No description provided.",
                meta: parts.join(" | ")
            };
        }

        function setArcs(t) {
            const frac = t / TICK;
            const offset = CIRC * (1 - frac);
            const r = Math.round(212 * (1 - frac) + 80 * frac);
            const g = Math.round(180 * frac);
            const color = `rgb(${r},${g},42)`;
            const glow = `drop-shadow(0 0 ${2 + (TICK - t) * 0.4}px rgba(${r},${g},42,0.9))`;
            arcEls.forEach((el) => {
                el.style.strokeDashoffset = offset;
                el.style.stroke = color;
                el.style.filter = glow;
            });
            numEls.forEach((el) => {
                el.textContent = String(t);
            });
        }

        function showPage(page, animate) {

            const ep = eventPages[page % eventPages.length];
            const cp = collabPages[page % collabPages.length];

            if (!animate) {
